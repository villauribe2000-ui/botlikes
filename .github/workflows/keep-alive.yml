name: Keep Render Service Alive

on:
  schedule:
    # Ejecutar cada 10 minutos
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
    - name: Ping Render Service
      run: |
        echo "🚀 Haciendo ping al bot en Render..."
        
        # Cambiar por tu URL de Render
        RENDER_URL="${{ secrets.RENDER_URL }}"
        
        if [ -z "$RENDER_URL" ]; then
          echo "⚠️ RENDER_URL no configurada en secrets"
          echo "📝 Agrega tu URL en: Settings > Secrets > Actions"
          echo "🔗 Ejemplo: https://tu-bot.onrender.com"
          exit 1
        fi
        
        # Hacer ping
        response=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_URL/health" || echo "000")
        
        if [ "$response" = "200" ]; then
          echo "✅ Bot activo - Status: $response"
        else
          echo "❌ Bot inactivo - Status: $response"
          echo "🔄 Intentando despertar el servicio..."
          curl -s "$RENDER_URL/" > /dev/null || true
        fi
        
        echo "⏰ Próximo ping en 10 minutos"